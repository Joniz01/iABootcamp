// ─── API CALL ─────────────────────────────────────────────────────────────────
async function streamAI({ provider, apiKey, systemPrompt, messages, onChunk }) {
  let full = "";

  if (provider === "gemini") {
    let contents = [];
    if (Array.isArray(messages) && messages.length > 0) {
      contents = messages.map(function(m) {
        return { role: m.role === "assistant" ? "model" : "user", parts: [{ text: m.content || "" }] };
      });
    }
    if (contents.length === 0) {
      contents = [{ role:"user", parts:[{ text:"Inicia la conversación." }] }];
    }
    const last = contents[contents.length - 1];
    if (last && last.role !== "user") {
      contents.push({ role:"user", parts:[{ text:"continúa" }] });
    }

    const url = "https://generativelanguage.googleapis.com/v1beta/models/" + PROVIDERS.gemini.model + ":streamGenerateContent?alt=sse&key=" + apiKey;
    const res = await fetch(url, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        systemInstruction: systemPrompt ? { parts:[{ text:systemPrompt }] } : undefined,
        contents: contents,
        generationConfig:{ maxOutputTokens:1200, temperature:0.7 },
      }),
    });
    if (!res.ok) {
      let errData = null;
      try { errData = await res.json(); } catch(e2) {}
      throw new Error((errData && errData.error && errData.error.message) || ("Gemini HTTP " + res.status));
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const chunk = await reader.read();
      if (chunk.done) break;
      const text = dec.decode(chunk.value, { stream:true });
      const lines = text.split("\n");
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (!data || data === "[DONE]") continue;
        try {
          const j = JSON.parse(data);
          const t = j.candidates && j.candidates[0] && j.candidates[0].content && j.candidates[0].content.parts && j.candidates[0].content.parts[0] && j.candidates[0].content.parts[0].text;
          if (t) { full += t; onChunk(full); }
        } catch(e3) {}
      }
    }

  } else if (provider === "groq") {
    const msgs = [{ role:"system", content: systemPrompt || "Eres un tutor útil." }];
    if (Array.isArray(messages)) {
      for (let i = 0; i < messages.length; i++) {
        msgs.push({ role:messages[i].role, content:messages[i].content });
      }
    }
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer " + apiKey },
      body: JSON.stringify({ model: PROVIDERS.groq.model, max_tokens:1200, stream:true, messages:msgs }),
    });
    if (!res.ok) {
      let errData = null;
      try { errData = await res.json(); } catch(e2) {}
      throw new Error((errData && errData.error && errData.error.message) || ("Groq HTTP " + res.status));
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const chunk = await reader.read();
      if (chunk.done) break;
      const text = dec.decode(chunk.value, { stream:true });
      const lines = text.split("\n");
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (data === "[DONE]") break;
        try {
          const j = JSON.parse(data);
          const t = j.choices && j.choices[0] && j.choices[0].delta && j.choices[0].delta.content;
          if (t) { full += t; onChunk(full); }
        } catch(e3) {}
      }
    }
  } else {
    throw new Error("Proveedor no soportado: " + provider);
  }

  return full;
}

function testKey(provider, apiKey) {
  const p = PROVIDERS[provider];
  const key = apiKey.trim();
  if (!key) throw new Error("Ingresa tu API key");
  if (!key.startsWith(p.keyPrefix)) throw new Error("La key de " + p.name + " debe empezar con \"" + p.keyPrefix + "\"");
  if (provider === "gemini" && key.length < 20) throw new Error("La key de Gemini parece demasiado corta");
  if (provider === "groq" && key.length < 30) throw new Error("La key de Groq parece demasiado corta");
}

// ─── ACTION PARSER ────────────────────────────────────────────────────────────
// Extrae el bloque ##ACCIONES## del texto y devuelve {text, actions[]}
function parseActions(raw) {
  if (!raw) return { text:"", actions:[] };
  const match = raw.match(/##ACCIONES##([\s\S]*?)##FIN##/i);
  if (!match) return { text:raw, actions:[] };
  const block = match[1];
  const actions = block.split("\n")
    .map(function(l) { return l.replace(/^\d+[\.\)]\s*/, "").replace(/^[-*]\s*/, "").trim(); })
    .filter(function(l) { return l.length > 3 && l.length < 80; });
  const text = raw.replace(/##ACCIONES##[\s\S]*?##FIN##/i, "").trim();
  return { text:text, actions:actions };
}

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function useLS(key, init) {
  const [v,setV] = useState(function() {
    try { var s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch(e) { return init; }
  });
  const set = function(x) {
    var n = typeof x === "function" ? x(v) : x;
    setV(n);
    try { localStorage.setItem(key, JSON.stringify(n)); } catch(e) {}
  };
  return [v, set];
}

// ─── RING ─────────────────────────────────────────────────────────────────────
function Ring({pct, size, sw, color}) {
  pct = pct || 0; size = size || 48; sw = sw || 4; color = color || "#111827";
  var r = (size-sw)/2, c = 2*Math.PI*r;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E7EB" strokeWidth={sw}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
        strokeDasharray={c} strokeDashoffset={c*(1-Math.min(pct,100)/100)} strokeLinecap="round"
        style={{transition:"stroke-dashoffset .6s ease"}}/>
      <text x="50%" y="50%" textAnchor="middle" dominantBaseline="central"
        style={{transform:"rotate(90deg)",transformOrigin:"50% 50%",fontSize:size*.21,fontWeight:700,fill:color}}>
        {Math.round(pct)}%
      </text>
    </svg>
  );
}

// ─── MARKDOWN LITE ────────────────────────────────────────────────────────────
function Md({text}) {
  text = text || "";
  var lines = text.split("\n");
  var els = [];
  var inCode = false, codeLines = [], lang = "", i = 0;

  function inline(str, k) {
    var parts = str.split(/(`[^`]+`|\*\*[^*]+\*\*)/g);
    return (
      <span key={k}>
        {parts.map(function(p, j) {
          if (p.startsWith("**") && p.endsWith("**"))
            return <strong key={j} style={{fontWeight:700}}>{p.slice(2,-2)}</strong>;
          if (p.startsWith("`") && p.endsWith("`"))
            return <code key={j} style={{background:"#F1F5F9",color:"#0F172A",padding:"1px 5px",borderRadius:4,fontSize:".88em",fontFamily:"monospace"}}>{p.slice(1,-1)}</code>;
          return p;
        })}
      </span>
    );
  }

  while (i < lines.length) {
    var l = lines[i];
    if (l.startsWith("```")) {
      if (!inCode) { inCode = true; lang = l.slice(3); codeLines = []; }
      else {
        els.push(
          <div key={i} style={{background:"#1E293B",borderRadius:8,padding:"12px 14px",margin:"8px 0",overflowX:"auto"}}>
            {lang && <div style={{fontSize:10,color:"#64748B",marginBottom:4,fontFamily:"monospace"}}>{lang}</div>}
            <pre style={{margin:0,fontSize:12,color:"#E2E8F0",fontFamily:"'Courier New',monospace",whiteSpace:"pre",lineHeight:1.6}}>{codeLines.join("\n")}</pre>
          </div>
        );
        inCode = false; codeLines = [];
      }
    } else if (inCode) {
      codeLines.push(l);
    } else if (l.match(/^#{1,3} /)) {
      var lv = l.match(/^(#+)/)[1].length;
      var txt = l.replace(/^#+\s/, "");
      els.push(<div key={i} style={{fontWeight:700,fontSize:lv===1?16:lv===2?14:13,color:"#111827",margin:"12px 0 4px"}}>{inline(txt,0)}</div>);
    } else if (l.match(/^[-*] /)) {
      els.push(
        <div key={i} style={{display:"flex",gap:8,margin:"3px 0"}}>
          <span style={{color:"#9CA3AF",flexShrink:0,marginTop:2}}>•</span>
          <span style={{fontSize:13,color:"#374151",lineHeight:1.6}}>{inline(l.slice(2),0)}</span>
        </div>
      );
    } else if (l.trim() === "") {
      els.push(<div key={i} style={{height:5}}/>);
    } else {
      els.push(<p key={i} style={{margin:"3px 0",fontSize:13,color:"#374151",lineHeight:1.7}}>{inline(l,0)}</p>);
    }
    i++;
  }
  return <div>{els}</div>;
}

// ─── ACTION BAR ───────────────────────────────────────────────────────────────
function ActionBar({actions, color, onAction, disabled}) {
  if (!actions || actions.length === 0) return null;
  return (
    <div style={{marginTop:8,padding:"10px 12px",background:"#F8FAFC",borderRadius:10,border:"1px solid #E2E8F0"}}>
      <div style={{fontSize:10,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".06em",marginBottom:7}}>
        ¿Qué quieres hacer ahora?
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {actions.map(function(a, i) {
          return (
            <button key={i} className="btn-action"
              style={{animationDelay:(i*0.06)+"s"}}
              onClick={function() { if (!disabled) onAction(a); }}
              disabled={disabled}
              onMouseEnter={function(e) { if (!disabled) e.currentTarget.style.background = i===0 ? color+"22" : "#F1F5F9"; }}
              onMouseLeave={function(e) { e.currentTarget.style.background = i===0 ? color+"0D" : "white"; }}>
              <span style={{
                display:"flex", alignItems:"center", gap:8,
                padding:"9px 12px", borderRadius:8,
                border:"1.5px solid "+(i===0 ? color+"50" : "#E2E8F0"),
                background: i===0 ? color+"0D" : "white",
                fontSize:13, color: i===0 ? color : "#374151",
                fontWeight: i===0 ? 600 : 400,
                cursor: disabled ? "not-allowed" : "pointer",
                textAlign:"left", lineHeight:1.4,
                opacity: disabled ? 0.5 : 1,
                transition:"background .12s",
                fontFamily:"inherit",
              }}>
                <span style={{fontSize:13,flexShrink:0}}>{i===0?"▶":"→"}</span>
                {a}
              </span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── CHAT ─────────────────────────────────────────────────────────────────────
function Chat({mod, provider, apiKey}) {
  const prov = PROVIDERS[provider];
  const [msgs, setMsgs] = useLS("chat4_" + provider + "_" + mod.id, []);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [streaming, setStreaming] = useState("");
  const [pendingActions, setPendingActions] = useState(
    msgs.length === 0 ? null : getDefaultActions(mod.id)
  );
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(function() {
    if (bottomRef.current) bottomRef.current.scrollIntoView({behavior:"smooth"});
  }, [msgs, streaming]);

  // Restore actions from last message on mount
  useEffect(function() {
    var last = null;
    for (var i = msgs.length - 1; i >= 0; i--) {
      if (msgs[i].role === "assistant") { last = msgs[i]; break; }
    }
    if (last && last.actions && last.actions.length > 0) {
      setPendingActions(last.actions);
    } else if (msgs.length > 0) {
      setPendingActions(getDefaultActions(mod.id));
    }
  }, []);

  function call(userMsg, history) {
    setLoading(true); setStreaming(""); setPendingActions(null);
    var allMsgs = history.concat([{role:"user", content:userMsg}]);
    streamAI({
      provider:provider, apiKey:apiKey,
      systemPrompt: mod.system,
      messages: allMsgs,
      onChunk: function(t) { setStreaming(t); },
    }).then(function(full) {
      setStreaming("");
      var parsed = parseActions(full);
      var actions = parsed.actions.length > 0 ? parsed.actions : getDefaultActions(mod.id);
      var newMsgs = history.concat([
        {role:"user", content:userMsg},
        {role:"assistant", content:full, cleanText:parsed.text, actions:actions},
      ]);
      setMsgs(newMsgs);
      setPendingActions(actions);
    }).catch(function(e) {
      setStreaming("");
      var errMsg = e.message || "Error desconocido";
      if (errMsg.includes("Failed to fetch") || errMsg.includes("NetworkError")) {
        errMsg = "No se pudo conectar. Abre este archivo en tu navegador local o en Vercel (no funciona dentro del Artifact de Claude.ai).";
      }
      var fallbackActions = getDefaultActions(mod.id);
      var newMsgs = history.concat([
        {role:"user", content:userMsg},
        {role:"assistant", content:"⚠️ " + errMsg, cleanText:"⚠️ " + errMsg, actions:fallbackActions},
      ]);
      setMsgs(newMsgs);
      setPendingActions(fallbackActions);
    }).finally(function() {
      setLoading(false);
      setTimeout(function() { if (inputRef.current) inputRef.current.focus(); }, 80);
    });
  }

  function send() {
    var t = input.trim();
    if (!t || loading) return;
    setInput("");
    call(t, msgs);
  }

  var starters = [
    "Hola! Quiero comenzar el módulo \"" + mod.name + "\". Dame una primera sesión práctica de 2 horas con los conceptos clave y un ejercicio concreto para empezar ahora mismo.",
    "Dame un ejercicio práctico para hacer ahora",
    "Explícame el concepto más importante del módulo",
    "¿Cómo sé si estoy listo para el siguiente módulo?",
  ];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0}}>
      {/* Chat header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderBottom:"1px solid #F3F4F6",flexShrink:0,background:"white"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:30,height:30,borderRadius:8,background:mod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{mod.emoji}</div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#111827"}}>Tutor IA — Módulo {mod.id}</div>
            <div style={{display:"flex",alignItems:"center",gap:4,marginTop:1}}>
              <span style={{fontSize:9}}>{prov.emoji}</span>
              <span style={{fontSize:10,color:"#9CA3AF"}}>{prov.name} · {prov.model}</span>
            </div>
          </div>
        </div>
        {msgs.length > 0 && (
          <button onClick={function() { if (window.confirm("¿Borrar historial de esta sesión?")) { setMsgs([]); setPendingActions(null); } }}
            style={{fontSize:11,color:"#9CA3AF",background:"none",border:"1px solid #E5E7EB",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontFamily:"inherit"}}>
            Nueva sesión
          </button>
        )}
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:12,minHeight:0}}>

        {/* Empty state */}
        {msgs.length === 0 && !loading && (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:260,gap:16,padding:"20px 0"}}>
            <div style={{width:64,height:64,borderRadius:20,background:mod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>{mod.emoji}</div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:15,fontWeight:700,color:"#111827",marginBottom:4}}>Tutor listo</div>
              <div style={{fontSize:12,color:"#6B7280",maxWidth:260,lineHeight:1.6,margin:"0 auto"}}>
                Especializado en <strong>{mod.name}</strong>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7,width:"100%",maxWidth:340}}>
              {starters.map(function(q, i) {
                return (
                  <button key={i} onClick={function() { call(q, []); }} style={{
                    background: i===0 ? mod.color.t : "white",
                    color: i===0 ? "white" : mod.color.t,
                    border:"1.5px solid "+mod.color.b, borderRadius:10,
                    padding: i===0 ? "12px 16px" : "9px 12px",
                    fontSize: i===0 ? 13 : 12, fontWeight: i===0 ? 700 : 400,
                    cursor:"pointer", textAlign:"left", lineHeight:1.4,
                    boxShadow: i===0 ? "0 4px 12px "+mod.color.t+"30" : "none",
                    fontFamily:"inherit",
                    display:"flex", alignItems:"center", gap:8,
                  }}>
                    <span>{i===0 ? "🚀" : "→"}</span>
                    {i===0 ? "Comenzar módulo "+mod.id+" (sesión guiada)" : q}
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Message history */}
        {msgs.map(function(m, i) {
          var isLast = i === msgs.length - 1;
          var displayText = m.cleanText || m.content;
          return (
            <div key={i} className="fadeup" style={{display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":"flex-start"}}>
              {m.role === "user" ? (
                <div style={{background:mod.color.t,color:"white",borderRadius:"14px 14px 4px 14px",padding:"10px 14px",maxWidth:"82%",fontSize:13,lineHeight:1.6}}>
                  {m.content}
                </div>
              ) : (
                <div style={{maxWidth:"96%",width:"96%"}}>
                  <div style={{background:"white",border:"1px solid #E5E7EB",borderRadius:"14px 14px 14px 4px",padding:"12px 14px"}}>
                    <Md text={displayText}/>
                  </div>
                  {isLast && !loading && m.actions && m.actions.length > 0 && (
                    <ActionBar actions={m.actions} color={mod.color.t} onAction={function(a) { call(a, msgs); }} disabled={loading}/>
                  )}
                </div>
              )}
            </div>
          );
        })}

        {/* Streaming bubble */}
        {(loading || streaming) && (
          <div className="fadeup" style={{display:"flex",alignItems:"flex-start"}}>
            <div style={{background:"white",border:"1px solid #E5E7EB",borderRadius:"14px 14px 14px 4px",padding:"12px 14px",maxWidth:"92%",width:"92%"}}>
              {streaming ? (
                <Md text={parseActions(streaming).text}/>
              ) : (
                <div style={{display:"flex",gap:5,alignItems:"center",padding:"4px 0"}}>
                  {[0,1,2].map(function(j) {
                    return <div key={j} style={{width:7,height:7,borderRadius:"50%",background:mod.color.t,animation:"pulse 1.2s ease-in-out infinite",animationDelay:(j*.2)+"s"}}/>;
                  })}
                </div>
              )}
            </div>
          </div>
        )}

        {/* Sticky action bar at bottom when conversation active */}
        {msgs.length > 0 && !loading && pendingActions && pendingActions.length > 0 && (
          <div style={{position:"sticky",bottom:0,paddingTop:4}}>
            <ActionBar actions={pendingActions} color={mod.color.t} onAction={function(a) { call(a, msgs); }} disabled={loading}/>
          </div>
        )}

        <div ref={bottomRef}/>
      </div>

      {/* Input bar */}
      {msgs.length > 0 && (
        <div style={{padding:"10px 12px",borderTop:"1px solid #F3F4F6",background:"white",flexShrink:0}}>
          <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <textarea ref={inputRef} value={input} rows={1}
              onChange={function(e) { setInput(e.target.value); e.target.style.height="auto"; e.target.style.height=Math.min(e.target.scrollHeight,100)+"px"; }}
              onKeyDown={function(e) { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
              placeholder="O escribe tu propia pregunta… (Enter para enviar)"
              disabled={loading}
              style={{flex:1,borderRadius:10,border:"1px solid #E5E7EB",padding:"10px 12px",fontSize:13,resize:"none",fontFamily:"inherit",lineHeight:1.5,outline:"none",background:loading?"#F9FAFB":"white",maxHeight:100,overflowY:"auto"}}/>
            <button onClick={send} disabled={loading || !input.trim()} style={{
              width:38,height:38,borderRadius:10,border:"none",flexShrink:0,
              background:(loading || !input.trim())?"#E5E7EB":mod.color.t,
              color:(loading || !input.trim())?"#9CA3AF":"white",
              cursor:(loading || !input.trim())?"not-allowed":"pointer",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,
              transition:"background .15s",fontFamily:"inherit",
            }}>↑</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SUBMODULE CARD ───────────────────────────────────────────────────────────

    <div style={{border:"1.5px solid "+sub.color+"30",borderRadius:12,overflow:"hidden",marginBottom:8}}>

        <span style={{fontSize:18}}>{sub.icon}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:sub.color}}>{sub.name}</div>

                <div style={{width:16,height:16,borderRadius:4,border:"2px solid "+((topicChecked||[])[i]?sub.color:"#D1D5DB"),background:(topicChecked||[])[i]?sub.color:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>

                </div>

            );
          })}
          <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".05em",margin:"12px 0 8px"}}>Proyectos</div>
          {sub.projects.map(function(p,pi) {
            return (
              <div key={pi} style={{border:"1px solid "+((projDone||{})[pi]?"#86EFAC":"#E5E7EB"),borderRadius:8,padding:"10px 12px",background:(projDone||{})[pi]?"#F0FDF4":"white",marginBottom:6,display:"flex",gap:10,alignItems:"flex-start"}}>
                <div onClick={function() { onProj(pi); }} style={{width:20,height:20,borderRadius:5,border:"2px solid "+((projDone||{})[pi]?sub.color:"#D1D5DB"),background:(projDone||{})[pi]?sub.color:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",marginTop:1}}>

                  <div style={{fontSize:12,fontWeight:700,color:(projDone||{})[pi]?"#166534":"#111827",marginBottom:2}}>

            );
          })}

    </div>

// ─── MODULE DETAIL ────────────────────────────────────────────────────────────
function ModDetail({mod, progress, onProgress, provider, apiKey}) {
  const [tab, setTab] = useState("contenido");
  var top = progress.topics || [];
  var prj = progress.projects || {};

  function toggleTopic(i) { var n=[...top]; n[i]=!n[i]; onProgress({...progress,topics:n}); }
  function toggleProj(pi) { onProgress({...progress,projects:{...prj,[pi]:!prj[pi]}}); }
  function toggleSubT(sid,i) { var st=progress.subTopics||{}; var c=st[sid]||[]; var n=[...c]; n[i]=!n[i]; onProgress({...progress,subTopics:{...st,[sid]:n}}); }
  function toggleSubP(sid,pi) { var sp=progress.subProjs||{}; var c=sp[sid]||{}; onProgress({...progress,subProjs:{...sp,[sid]:{...c,[pi]:!c[pi]}}}); }

  var total=0, done=0;
  if (mod.submodules) {
    mod.submodules.forEach(function(s) {
      total += s.topics.length + s.projects.length;
      var st = (progress.subTopics||{})[s.id]||[];
      var sp = (progress.subProjs||{})[s.id]||{};
      done += st.filter(Boolean).length + Object.values(sp).filter(Boolean).length;
    });
  } else {
    total = mod.topics.length + mod.projects.length;
    done = top.filter(Boolean).length + Object.values(prj).filter(Boolean).length;
  }
  var pct = total > 0 ? Math.round(done/total*100) : 0;

  function Tab({id, label, icon}) {
    return (
      <button onClick={function() { setTab(id); }} style={{
        flex:1, padding:"10px 0", border:"none", background:"transparent",
        fontSize:13, fontWeight:tab===id?700:400, color:tab===id?mod.color.t:"#9CA3AF",
        borderBottom:tab===id?"2px solid "+mod.color.t:"2px solid transparent",
        cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:5,
        fontFamily:"inherit",
      }}>
        <span style={{fontSize:14}}>{icon}</span>{label}
      </button>
    );
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0}}>
      <div style={{padding:"14px 14px 0",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:12}}>
          <div style={{width:46,height:46,borderRadius:12,background:mod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{mod.emoji}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
              <span style={{fontSize:10,color:"#9CA3AF",fontWeight:700}}>MÓDULO {mod.id}</span>
              <Pill label={mod.level} color={mod.color.t} bg={mod.color.bg}/>
            </div>
            <h2 style={{fontSize:16,fontWeight:800,color:"#111827",margin:"0 0 2px",lineHeight:1.3}}>{mod.name}</h2>
            <p style={{fontSize:11,color:"#6B7280",margin:0}}>{mod.weeks} · {mod.hours}</p>
          </div>
          <Ring pct={pct} size={44} sw={4} color={mod.color.t}/>
        </div>
      </div>

      <div style={{display:"flex",borderBottom:"1px solid #F3F4F6",flexShrink:0,padding:"0 14px"}}>
        <Tab id="contenido" label="Contenido" icon="📋"/>
        <Tab id="ia" label="Tutor IA" icon="🤖"/>
      </div>

      <div style={{flex:1,overflow:tab==="ia"?"hidden":"auto",display:"flex",flexDirection:"column",minHeight:0}}>
        {tab==="contenido" && (
          <div style={{padding:"14px",paddingBottom:60,overflowY:"auto"}}>
            {mod.submodules ? (
              <>
                <div style={{background:"#FFFBEB",border:"1px solid #FCD34D",borderRadius:10,padding:"10px 12px",marginBottom:14,display:"flex",gap:8}}>
                  <span style={{fontSize:14,flexShrink:0}}>💡</span>
                  <p style={{fontSize:11,color:"#92400E",margin:0,lineHeight:1.6}}>Este módulo tiene <strong>3 sub-módulos</strong>. Usa el <strong>Tutor IA</strong> para sesiones guiadas de Python, JavaScript y la API.</p>
                </div>
                {mod.submodules.map(function(sub) {
                  return <SubCard key={sub.id} sub={sub}
                    topicChecked={(progress.subTopics||{})[sub.id]}
                    projDone={(progress.subProjs||{})[sub.id]}
                    onTopic={function(i) { toggleSubT(sub.id,i); }}
                    onProj={function(pi) { toggleSubP(sub.id,pi); }}/>;
                })}
              </>
            ) : (
              <>
                <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".05em",marginBottom:10}}>Temas</div>
                {mod.topics.map(function(t,i) {
                  return (
                    <label key={i} onClick={function() { toggleTopic(i); }} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 10px",borderRadius:8,cursor:"pointer",marginBottom:4,background:top[i]?"#F0FDF4":"#FAFAFA",border:"1px solid "+(top[i]?"#86EFAC":"#F3F4F6"),transition:"all .15s"}}>
                      <div style={{width:18,height:18,borderRadius:5,border:"2px solid "+(top[i]?mod.color.t:"#D1D5DB"),background:top[i]?mod.color.t:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                        {top[i] && <span style={{color:"white",fontSize:9}}>✓</span>}
                      </div>
                      <span style={{fontSize:13,color:top[i]?"#166534":"#374151",textDecoration:top[i]?"line-through":"none",lineHeight:1.5}}>{t}</span>
                    </label>
                  );
                })}

                <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".05em",margin:"16px 0 10px"}}>Proyectos hands-on</div>
                {mod.projects.map(function(p,pi) {
                  return (
                    <div key={pi} style={{border:"1px solid "+(prj[pi]?"#86EFAC":"#E5E7EB"),borderRadius:10,padding:"12px",background:prj[pi]?"#F0FDF4":"white",marginBottom:8,display:"flex",gap:10,alignItems:"flex-start"}}>
                      <div onClick={function() { toggleProj(pi); }} style={{width:22,height:22,borderRadius:6,border:"2px solid "+(prj[pi]?mod.color.t:"#D1D5DB"),background:prj[pi]?mod.color.t:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",marginTop:1}}>
                        {prj[pi] && <span style={{color:"white",fontSize:11}}>✓</span>}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:3}}>
                          <span style={{fontSize:13,fontWeight:700,color:prj[pi]?"#166534":"#111827"}}>{p.t}</span>
                          <Pill label={p.tag} color={mod.color.t} bg={mod.color.bg}/>
                        </div>
                        <p style={{fontSize:12,color:prj[pi]?"#15803D":"#6B7280",margin:0,lineHeight:1.5}}>{p.d}</p>
                      </div>
                    </div>
                  );
                })}
              </>
            )}

            <div style={{marginTop:16,padding:"12px",background:mod.color.bg,border:"1px solid "+mod.color.b,borderRadius:10,display:"flex",gap:10,alignItems:"center"}}>
              <span style={{fontSize:18}}>🤖</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700,color:mod.color.t,marginBottom:2}}>¿Listo para practicar?</div>
                <div style={{fontSize:11,color:"#6B7280"}}>Ve al Tutor IA para sesiones guiadas con botones de acción</div>
              </div>
              <button onClick={function() { setTab("ia"); }} style={{background:mod.color.t,color:"white",border:"none",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0,fontFamily:"inherit"}}>Ir →</button>
            </div>
          </div>
        )}

        {tab==="ia" && (
          <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0,overflow:"hidden"}}>
            <Chat mod={mod} provider={provider} apiKey={apiKey}/>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function Settings({provider, onChangeProvider, onClearAll}) {
  const prov = PROVIDERS[provider];
  const [confirmDel, setConfirmDel] = useState(false);

  return (
    <div style={{padding:"20px 16px",maxWidth:440,margin:"0 auto"}}>
      <h2 style={{fontSize:18,fontWeight:800,color:"#111827",marginBottom:16}}>Ajustes</h2>
      <div style={{background:prov.bg,border:"1.5px solid "+prov.border,borderRadius:12,padding:"12px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:20}}>{prov.emoji}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:2}}>Proveedor activo</div>
          <div style={{fontSize:13,fontWeight:700,color:prov.color}}>{prov.name} · {prov.model}</div>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <button onClick={onChangeProvider} style={{padding:"14px",borderRadius:12,border:"1px solid #E5E7EB",background:"white",fontSize:13,fontWeight:700,color:"#111827",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10,fontFamily:"inherit"}}>
          🔄 <span>Cambiar proveedor o API key</span>
        </button>
        {!confirmDel ? (
          <button onClick={function() { setConfirmDel(true); }} style={{padding:"14px",borderRadius:12,border:"1px solid #FECACA",background:"#FEF2F2",fontSize:13,fontWeight:700,color:"#B91C1C",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10,fontFamily:"inherit"}}>
            🗑️ <span>Borrar todo (progreso + clave)</span>
          </button>
        ) : (
          <div style={{padding:"14px",borderRadius:12,border:"1px solid #FECACA",background:"#FEF2F2"}}>
            <p style={{fontSize:13,color:"#B91C1C",marginBottom:10}}>¿Seguro? Se borrará todo el progreso, historial de chat y tu API key.</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={function() { setConfirmDel(false); }} style={{flex:1,padding:"9px",borderRadius:8,border:"1px solid #E5E7EB",background:"white",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button>
              <button onClick={onClearAll} style={{flex:1,padding:"9px",borderRadius:8,border:"none",background:"#B91C1C",color:"white",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Sí, borrar todo</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function Home({progMap, provider, onSelect, onSettings}) {
  const prov = PROVIDERS[provider];

  function getP(mod) {
    var p = progMap[mod.id] || {};
    var total=0, done=0;
    if (mod.submodules) {
      mod.submodules.forEach(function(s) {
        total += s.topics.length + s.projects.length;
        var st = (p.subTopics||{})[s.id]||[];
        var sp = (p.subProjs||{})[s.id]||{};
        done += st.filter(Boolean).length + Object.values(sp).filter(Boolean).length;
      });
    } else {
      total = mod.topics.length + mod.projects.length;
      done = (p.topics||[]).filter(Boolean).length + Object.values(p.projects||{}).filter(Boolean).length;
    }
    return total > 0 ? Math.round(done/total*100) : 0;
  }

  var gp = Math.round(MODULES.reduce(function(a,m) { return a + getP(m); }, 0) / MODULES.length);

  return (
    <div style={{paddingBottom:40}}>
      <div style={{padding:"22px 16px 16px",borderBottom:"1px solid #E5E7EB",background:"white"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:"#9CA3AF",letterSpacing:".08em",textTransform:"uppercase",marginBottom:5}}>Bootcamp · 12 semanas · 2–4h/día</div>
            <h1 style={{fontSize:22,fontWeight:900,color:"#111827",margin:"0 0 5px",lineHeight:1.2}}>De Básico<br/>a Experto en Claude</h1>
            <p style={{fontSize:12,color:"#6B7280",margin:0}}>7 módulos · 20+ proyectos · Tutor IA guiado</p>
          </div>
          <Ring pct={gp} size={58} sw={5} color="#111827"/>
        </div>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:10,padding:"5px 10px",borderRadius:20,background:prov.bg,border:"1px solid "+prov.border}}>
          <span style={{fontSize:12}}>{prov.emoji}</span>
          <span style={{fontSize:11,fontWeight:700,color:prov.color}}>{prov.name}</span>
          <span style={{fontSize:10,color:"#6B7280"}}>· Gratis</span>
        </div>
        <div style={{height:5,background:"#F3F4F6",borderRadius:5,overflow:"hidden",marginTop:12}}>
          <div style={{height:"100%",width:gp+"%",background:"#111827",borderRadius:5,transition:"width .6s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
          <span style={{fontSize:10,color:"#9CA3AF"}}>Progreso total</span>
          <span style={{fontSize:10,color:"#9CA3AF"}}>{gp}% completado</span>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:"#F9FAFB",borderBottom:"1px solid #E5E7EB"}}>
        {[{v:"12",l:"semanas"},{v:"~400h",l:"práctica"},{v:"20+",l:"proyectos"}].map(function(s,i) {
          return (
            <div key={i} style={{padding:"12px 8px",textAlign:"center",borderRight:i<2?"1px solid #E5E7EB":"none"}}>
              <div style={{fontSize:17,fontWeight:800,color:"#111827"}}>{s.v}</div>
              <div style={{fontSize:10,color:"#9CA3AF"}}>{s.l}</div>
            </div>
          );
        })}
      </div>

      <div style={{padding:"14px"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Módulos del programa</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {MODULES.map(function(mod) {
            var pct = getP(mod);
            var active = pct > 0;
            return (
              <button key={mod.id} onClick={function() { onSelect(mod.id); }} style={{
                display:"flex",alignItems:"center",gap:12,padding:"13px",
                borderRadius:14,border:"1.5px solid "+(active?mod.color.b:"#E5E7EB"),
                background:active?mod.color.bg+"BB":"white",
                cursor:"pointer",textAlign:"left",transition:"all .15s",width:"100%",fontFamily:"inherit",
              }}>
                <div style={{width:42,height:42,borderRadius:11,background:mod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{mod.emoji}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2,flexWrap:"wrap"}}>
                    <span style={{fontSize:9,color:"#9CA3AF",fontWeight:700}}>{mod.id}</span>
                    <Pill label={mod.level} color={mod.color.t} bg={mod.color.bg}/>
                    {mod.submodules && <Pill label="3 sub-mód." color="#6D28D9" bg="#F5F3FF"/>}
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{mod.name}</div>
                  <div style={{fontSize:11,color:"#6B7280",marginTop:1}}>{mod.weeks} · {mod.hours}</div>
                </div>
                <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                  <Ring pct={pct} size={38} sw={3} color={mod.color.t}/>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:pct===100?"#22C55E":pct>0?"#F59E0B":"#E5E7EB"}}/>
                    <span style={{fontSize:10,color:"#9CA3AF"}}>{pct===100?"Completo":pct>0?"En curso":"Pendiente"}</span>
                  </div>
                </div>
              </button>
            );
          })}
        </div>
        <button onClick={onSettings} style={{marginTop:14,width:"100%",padding:"11px",borderRadius:10,border:"1px solid #E5E7EB",background:"#F9FAFB",fontSize:12,color:"#6B7280",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontFamily:"inherit"}}>
          ⚙️ Ajustes (cambiar proveedor, borrar progreso)
        </button>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [cfg, setCfg] = useLS("cb_cfg_v4", null);
  const [progMap, setProgMap] = useLS("cb_prog_v4", {});
  const [view, setView] = useState("home");
  const [setupMode, setSetupMode] = useState(false);

  var needSetup = !cfg || !cfg.apiKey;
  var activeMod = view.startsWith("m:") ? MODULES.find(function(m) { return m.id === view.slice(2); }) : null;

  function clearAll() {
    Object.keys(localStorage).filter(function(k) {
      return k.startsWith("cb_") || k.startsWith("chat4_");
    }).forEach(function(k) { localStorage.removeItem(k); });
    setCfg(null); setProgMap({}); setSetupMode(true); setView("home");
  }

  if (needSetup || setupMode) {
    return <Setup onSave={function(provider, apiKey) { setCfg({provider:provider, apiKey:apiKey}); setSetupMode(false); }}/>;
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#F0EFE9",maxWidth:520,margin:"0 auto",boxShadow:"0 0 40px rgba(0,0,0,.08)",fontFamily:"inherit"}}>
      {/* Nav */}
      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(255,255,255,.97)",backdropFilter:"blur(10px)",borderBottom:"1px solid #F3F4F6",padding:"0 14px",height:50,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        {view !== "home" && (
          <button onClick={function() { setView("home"); }} style={{background:"none",border:"none",cursor:"pointer",color:"#374151",fontSize:20,padding:"0 6px 0 0",display:"flex",alignItems:"center",flexShrink:0,fontFamily:"inherit"}}>←</button>
        )}
        <div style={{display:"flex",alignItems:"center",gap:7,flex:1,minWidth:0}}>
          <div style={{width:26,height:26,borderRadius:7,background:"#111827",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"white",flexShrink:0}}>C</div>
          <span style={{fontSize:14,fontWeight:700,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {activeMod ? (activeMod.emoji + " Módulo " + activeMod.id) : view==="settings" ? "Ajustes" : "Claude Bootcamp"}
          </span>
        </div>
        {view === "home" && (
          <div style={{display:"flex",alignItems:"center",gap:4,background:PROVIDERS[cfg.provider].bg,border:"1px solid "+PROVIDERS[cfg.provider].border,borderRadius:20,padding:"3px 8px",flexShrink:0}}>
            <span style={{fontSize:11}}>{PROVIDERS[cfg.provider].emoji}</span>
            <span style={{fontSize:10,fontWeight:700,color:PROVIDERS[cfg.provider].color}}>{PROVIDERS[cfg.provider].name}</span>
          </div>
        )}
      </div>

      {/* Content */}
      <div style={{flex:1,overflow:activeMod?"hidden":"auto",display:"flex",flexDirection:"column",minHeight:0}}>
        {activeMod ? (
          <ModDetail mod={activeMod} progress={progMap[activeMod.id]||{}}
            onProgress={function(p) { setProgMap(function(prev) { return Object.assign({},prev,{[activeMod.id]:p}); }); }}
            provider={cfg.provider} apiKey={cfg.apiKey}/>
        ) : view === "settings" ? (
          <Settings provider={cfg.provider} onChangeProvider={function() { setSetupMode(true); }} onClearAll={clearAll}/>
        ) : (
          <div style={{overflowY:"auto",flex:1}}>
            <Home progMap={progMap} provider={cfg.provider} onSelect={function(id) { setView("m:"+id); }} onSettings={function() { setView("settings"); }}/>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
