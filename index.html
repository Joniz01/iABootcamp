// ─── API CALL (abstracted) ────────────────────────────────────────────────────
async function streamAI({ provider, apiKey, systemPrompt, messages, onChunk }) {
  let full = "";

  if (provider === "gemini") {
    // Preparar contents de forma segura
    let contents = [];
    if (Array.isArray(messages) && messages.length > 0) {
      contents = messages.map(m => ({
        role: m.role === "assistant" ? "model" : "user",
        parts: [{ text: m.content || "" }],
      }));
    }

    // Caso primer mensaje: Gemini requiere al menos un content "user"
    if (contents.length === 0) {
      contents = [{ role: "user", parts: [{ text: "Inicia la conversación." }] }];
    }

    // Asegurar que el último mensaje sea "user" (regla común de Gemini para chat)
    const last = contents[contents.length - 1];
    if (last && last.role !== "user") {
      contents.push({ role: "user", parts: [{ text: "" }] }); // placeholder vacío
    }

    const modelName = PROVIDERS.gemini.model || "gemini-2.5-flash"; // ← usa el valor de PROVIDERS
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:streamGenerateContent?alt=sse&key=${apiKey}`;

    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemInstruction: systemPrompt ? { parts: [{ text: systemPrompt }] } : undefined,
        contents,
        generationConfig: {
          maxOutputTokens: 1024,
          temperature: 0.7,
        },
      }),
    });

    if (!res.ok) {
      let errData;
      try { errData = await res.json(); } catch {}
      const errMsg = errData?.error?.message || `Gemini HTTP ${res.status}`;
      throw new Error(errMsg);
    }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = dec.decode(value, { stream: true });
      for (const line of chunk.split("\n")) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (!data || data === "[DONE]") continue;
        try {
          const j = JSON.parse(data);
          const text = j.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) {
            full += text;
            onChunk(full);
          }
        } catch (e) {
          console.warn("JSON parse error in Gemini stream:", e);
        }
      }
    }
  } 
  else if (provider === "groq") {
    // ← Este bloque faltaba o estaba truncado en tu copia
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`,
      },
      body: JSON.stringify({
        model: PROVIDERS.groq.model || "llama-3.3-70b-versatile",
        max_tokens: 1024,
        stream: true,
        messages: [
          { role: "system", content: systemPrompt || "Eres un tutor útil." },
          ...(Array.isArray(messages) ? messages : []),
        ],
      }),
    });

    if (!res.ok) {
      let errData;
      try { errData = await res.json(); } catch {}
      throw new Error(errData?.error?.message || `Groq HTTP ${res.status}`);
    }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = dec.decode(value, { stream: true });
      for (const line of chunk.split("\n")) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (data === "[DONE]") break;
        try {
          const j = JSON.parse(data);
          const text = j.choices?.[0]?.delta?.content;
          if (text) {
            full += text;
            onChunk(full);
          }
        } catch (e) {
          console.warn("JSON parse error in Groq stream:", e);
        }
      }
    }
  } 
  else {
    throw new Error(`Proveedor no soportado: ${provider}`);
  }

  return full;
}

function testKey(provider, apiKey) {
  const p = PROVIDERS[provider];
  const key = apiKey.trim();
  if (!key) throw new Error("Ingresa tu API key");
  if (!key.startsWith(p.keyPrefix)) throw new Error(`La key de ${p.name} debe empezar con "${p.keyPrefix}"`);
  if (provider === "gemini" && key.length < 20) throw new Error("La key de Gemini parece demasiado corta");
  if (provider === "groq" && key.length < 30) throw new Error("La key de Groq parece demasiado corta");
  // Format OK — real validation happens on first message
}

// ─── STORAGE HOOK ─────────────────────────────────────────────────────────────
function useLS(key, init) {
  const [v,setV] = useState(()=>{ try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;} });
  const set = x => { const n=typeof x==="function"?x(v):x; setV(n); try{localStorage.setItem(key,JSON.stringify(n));}catch{} };
  return [v,set];
}

// ─── RING ─────────────────────────────────────────────────────────────────────
function Ring({pct=0,size=48,sw=4,color="#111827"}) {
  const r=(size-sw)/2,c=2*Math.PI*r;
  return <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E7EB" strokeWidth={sw}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
      strokeDasharray={c} strokeDashoffset={c*(1-Math.min(pct,100)/100)} strokeLinecap="round"
      style={{transition:"stroke-dashoffset .6s ease"}}/>
    <text x="50%" y="50%" textAnchor="middle" dominantBaseline="central"
      style={{transform:"rotate(90deg)",transformOrigin:"50% 50%",fontSize:size*.21,fontWeight:700,fill:color}}>
      {Math.round(pct)}%
    </text>
  </svg>;
}

// ─── MARKDOWN LITE ────────────────────────────────────────────────────────────
function Md({text=""}) {
  const lines=text.split("\n"); const els=[]; let inCode=false,codeLines=[],lang="",i=0;
  const inline=(str,k)=>{
    const parts=str.split(/(`[^`]+`|\*\*[^*]+\*\*)/g);
    return <span key={k}>{parts.map((p,j)=>{
      if(p.startsWith("**")&&p.endsWith("**"))return<strong key={j} style={{fontWeight:700}}>{p.slice(2,-2)}</strong>;
      if(p.startsWith("`")&&p.endsWith("`"))return<code key={j} style={{background:"#F1F5F9",color:"#0F172A",padding:"1px 5px",borderRadius:4,fontSize:".88em",fontFamily:"monospace"}}>{p.slice(1,-1)}</code>;
      return p;
    })}</span>;
  };
  while(i<lines.length){
    const l=lines[i];
    if(l.startsWith("```")){
      if(!inCode){inCode=true;lang=l.slice(3);codeLines=[];}
      else{els.push(<div key={i} style={{background:"#1E293B",borderRadius:8,padding:"12px 14px",margin:"8px 0",overflowX:"auto"}}>
        {lang&&<div style={{fontSize:10,color:"#64748B",marginBottom:4,fontFamily:"monospace"}}>{lang}</div>}
        <pre style={{margin:0,fontSize:12,color:"#E2E8F0",fontFamily:"'Courier New',monospace",whiteSpace:"pre",lineHeight:1.6}}>{codeLines.join("\n")}</pre>
      </div>);inCode=false;codeLines=[];}
    } else if(inCode){codeLines.push(l);}
    else if(l.match(/^#{1,3} /)){const lv=l.match(/^(#+)/)[1].length,txt=l.replace(/^#+\s/,"");els.push(<div key={i} style={{fontWeight:700,fontSize:lv===1?16:lv===2?14:13,color:"#111827",margin:"12px 0 4px"}}>{inline(txt,0)}</div>);}
    else if(l.match(/^[-*] /)){els.push(<div key={i} style={{display:"flex",gap:8,margin:"3px 0"}}><span style={{color:"#9CA3AF",flexShrink:0,marginTop:2}}>•</span><span style={{fontSize:13,color:"#374151",lineHeight:1.6}}>{inline(l.slice(2),0)}</span></div>);}
    else if(l.trim()===""){els.push(<div key={i} style={{height:5}}/>);}
    else{els.push(<p key={i} style={{margin:"3px 0",fontSize:13,color:"#374151",lineHeight:1.7}}>{inline(l,0)}</p>);}
    i++;
  }
  return <div>{els}</div>;
}

              border:`1.5px solid ${err?"#FECACA":key?prov.color:"#E5E7EB"}`,

          <span style={{fontSize:11,color:"#6B7280"}}>{prov.keyHint} — </span>

        <div style={{background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:10,padding:"9px 12px",marginBottom:10,display:"flex",gap:8}}>
          <span style={{fontSize:13,flexShrink:0}}>⚠️</span>
          <p style={{fontSize:11,color:"#92400E",margin:0,lineHeight:1.5}}><strong>Importante:</strong> el Tutor IA no funciona dentro del Artifact de Claude.ai (sandbox bloqueado). <strong>Despliega el HTML en Vercel o ábrelo en tu navegador local</strong> para que funcione correctamente.</p>
        </div>
        <div style={{background:"#F0FDF4",border:"1px solid #A7F3D0",borderRadius:10,padding:"9px 12px",marginBottom:20,display:"flex",gap:8}}>
          <span style={{fontSize:13,flexShrink:0}}>🔒</span>
          <p style={{fontSize:11,color:"#065F46",margin:0,lineHeight:1.5}}>Tu key se guarda <strong>solo en este navegador</strong> (localStorage). Nunca sale a ningún servidor externo.</p>
        </div>

        <button onClick={verify} disabled={!key} style={{
          width:"100%",padding:13,borderRadius:12,border:"none",
          background:!key?"#E5E7EB":prov.color,
          color:!key?"#9CA3AF":"white",
          fontSize:14,fontWeight:700,cursor:!key?"not-allowed":"pointer",
          transition:"all .15s",boxShadow:!key?"none":`0 4px 12px ${prov.color}40`,
        }}>
          Guardar y continuar →
        </button>
      </div>
    </div>
  );
}

// ─── CHAT ─────────────────────────────────────────────────────────────────────
function Chat({mod, provider, apiKey}) {
  const prov = PROVIDERS[provider];
  const [msgs, setMsgs] = useLS(`chat3_${provider}_${mod.id}`, []);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [streaming, setStreaming] = useState("");
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,streaming]);

  const call = async (userMsg, history) => {
    setLoading(true); setStreaming("");
    try {
      const full = await streamAI({
        provider, apiKey,
        systemPrompt: mod.system,
        messages: [...history, {role:"user",content:userMsg}],
        onChunk: t => setStreaming(t),
      });
      setStreaming("");
      setMsgs(p=>[...p,{role:"user",content:userMsg},{role:"assistant",content:full}]);
    } catch(e) {
      setStreaming("");
      let errMsg = e.message;
      if (errMsg.includes("Failed to fetch") || errMsg.includes("NetworkError")) {
        errMsg = "❌ No se pudo conectar con la API. Si estás dentro de Claude.ai (Artifact), descarga el HTML y ábrelo en tu navegador local o despliégalo en Vercel/Netlify.";
      } else if (errMsg.includes("not found for API version v1beta")) {
  errMsg = "❌ Modelo Gemini obsoleto. Se actualizó automáticamente a Gemini 2.5 Flash. Prueba de nuevo.";
}
      setMsgs(p=>[...p,{role:"user",content:userMsg},{role:"assistant",content:`⚠️ ${errMsg}`}]);
    }
    setLoading(false);
  };

  const send = () => { const t=input.trim(); if(!t||loading)return; setInput(""); call(t,msgs); setTimeout(()=>inputRef.current?.focus(),80); };

  const starters = [
    `Hola! Quiero comenzar el módulo "${mod.name}". Dame una primera sesión práctica de 2 horas con los conceptos clave y un ejercicio para empezar ahora mismo.`,
    "Dame un ejercicio práctico para hacer ahora",
    "Explícame el concepto más importante del módulo",
    "¿Cómo sé si estoy listo para el siguiente módulo?",
  ];

  return <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0}}>
    {/* header */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderBottom:"1px solid #F3F4F6",flexShrink:0,background:"white"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:30,height:30,borderRadius:8,background:mod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{mod.emoji}</div>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:"#111827"}}>Tutor IA — Módulo {mod.id}</div>
          <div style={{display:"flex",alignItems:"center",gap:5,marginTop:1}}>
            <span style={{fontSize:9}}>{prov.emoji}</span>
            <span style={{fontSize:10,color:"#9CA3AF"}}>{prov.name} · {prov.model}</span>
          </div>
        </div>
      </div>
      {msgs.length>0&&<button onClick={()=>{if(confirm("¿Borrar historial?"))setMsgs([]);}} style={{fontSize:11,color:"#9CA3AF",background:"none",border:"1px solid #E5E7EB",borderRadius:6,padding:"4px 8px",cursor:"pointer"}}>Nueva sesión</button>}
    </div>

    {/* messages */}
    <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:12,minHeight:0}}>
      {msgs.length===0&&!loading&&(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:300,gap:16,padding:"20px 0"}}>
          <div style={{textAlign:"center"}}>
            <div style={{width:64,height:64,borderRadius:20,background:mod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 12px"}}>{mod.emoji}</div>
            <div style={{fontSize:15,fontWeight:700,color:"#111827",marginBottom:4}}>Tutor listo</div>
            <div style={{fontSize:12,color:"#6B7280",maxWidth:260,lineHeight:1.6,margin:"0 auto"}}>Especializado en <strong>{mod.name}</strong>. Usa {prov.name} ({prov.tag.toLowerCase()}).</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:7,width:"100%",maxWidth:340}}>
            {starters.map((q,i)=>(
              <button key={i} onClick={()=>call(q,[])} style={{
                background:i===0?mod.color.t:"white",
                color:i===0?"white":mod.color.t,
                border:`1.5px solid ${mod.color.b}`,borderRadius:10,
                padding:i===0?"12px 16px":"9px 12px",fontSize:i===0?13:12,
                fontWeight:i===0?700:400,cursor:"pointer",textAlign:"left",lineHeight:1.4,
                boxShadow:i===0?`0 4px 12px ${mod.color.t}30`:"none",
              }}>{i===0?"🚀 Comenzar módulo "+mod.id:q}</button>
            ))}
          </div>
        </div>
      )}

      {msgs.map((m,i)=>(
        <div key={i} className="fadeup" style={{display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":"flex-start"}}>
          {m.role==="user"
            ?<div style={{background:mod.color.t,color:"white",borderRadius:"14px 14px 4px 14px",padding:"10px 14px",maxWidth:"82%",fontSize:13,lineHeight:1.6}}>{m.content}</div>
            :<div style={{background:"white",border:"1px solid #E5E7EB",borderRadius:"14px 14px 14px 4px",padding:"12px 14px",maxWidth:"92%",width:"92%"}}><Md text={m.content}/></div>
          }
        </div>
      ))}

      {(loading||streaming)&&<div className="fadeup" style={{display:"flex",alignItems:"flex-start"}}>
        <div style={{background:"white",border:"1px solid #E5E7EB",borderRadius:"14px 14px 14px 4px",padding:"12px 14px",maxWidth:"92%",width:"92%"}}>
          {streaming?<Md text={streaming}/>:<div style={{display:"flex",gap:5,alignItems:"center",padding:"4px 0"}}>{[0,1,2].map(j=><div key={j} style={{width:7,height:7,borderRadius:"50%",background:mod.color.t,animation:"pulse 1.2s ease-in-out infinite",animationDelay:`${j*.2}s`}}/>)}</div>}
        </div>
      </div>}
      <div ref={bottomRef}/>
    </div>

    {/* input */}
    {msgs.length>0&&<div style={{padding:"10px 12px",borderTop:"1px solid #F3F4F6",background:"white",flexShrink:0}}>
      <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
        <textarea ref={inputRef} value={input} rows={1}
          onChange={e=>{ setInput(e.target.value); e.target.style.height="auto"; e.target.style.height=Math.min(e.target.scrollHeight,100)+"px"; }}
          onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }}
          placeholder="Escribe tu pregunta… (Enter para enviar)"
          disabled={loading}
          style={{flex:1,borderRadius:10,border:"1px solid #E5E7EB",padding:"10px 12px",fontSize:13,resize:"none",fontFamily:"inherit",lineHeight:1.5,outline:"none",background:loading?"#F9FAFB":"white",maxHeight:100,overflowY:"auto"}}/>
        <button onClick={send} disabled={loading||!input.trim()} style={{width:38,height:38,borderRadius:10,border:"none",flexShrink:0,background:(loading||!input.trim())?"#E5E7EB":mod.color.t,color:(loading||!input.trim())?"#9CA3AF":"white",cursor:(loading||!input.trim())?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,transition:"background .15s"}}>↑</button>
      </div>
    </div>}
  </div>;
}

// ─── SUBMODULE ────────────────────────────────────────────────────────────────
function SubCard({sub,topicChecked,projDone,onTopic,onProj}) {
  const [open,setOpen]=useState(false);
  const done=(topicChecked||[]).filter(Boolean).length+Object.values(projDone||{}).filter(Boolean).length;
  const total=sub.topics.length+sub.projects.length;
  const pct=total>0?Math.round(done/total*100):0;
  return <div style={{border:`1.5px solid ${sub.color}30`,borderRadius:12,overflow:"hidden",marginBottom:8}}>
    <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:sub.bg,cursor:"pointer",userSelect:"none"}}>
      <span style={{fontSize:18}}>{sub.icon}</span>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:700,color:sub.color}}>{sub.name}</div>
        <div style={{fontSize:11,color:"#6B7280",marginTop:1}}>{sub.dur} · {sub.topics.length} temas · {sub.projects.length} proyectos</div>
      </div>
      <Ring pct={pct} size={36} sw={3} color={sub.color}/>
      <span style={{fontSize:10,color:"#9CA3AF",transition:".2s",transform:open?"rotate(180deg)":"none"}}>▼</span>
    </div>
    {open&&<div style={{padding:12,background:"white",borderTop:`1px solid ${sub.color}15`}}>
      <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Temas</div>
      {sub.topics.map((t,i)=><label key={i} onClick={()=>onTopic(i)} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"7px 8px",borderRadius:7,cursor:"pointer",background:(topicChecked||[])[i]?"#F0FDF4":"transparent",marginBottom:3}}>
        <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${(topicChecked||[])[i]?sub.color:"#D1D5DB"}`,background:(topicChecked||[])[i]?sub.color:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
          {(topicChecked||[])[i]&&<span style={{color:"white",fontSize:9}}>✓</span>}
        </div>
        <span style={{fontSize:12,color:(topicChecked||[])[i]?"#166534":"#374151",textDecoration:(topicChecked||[])[i]?"line-through":"none",lineHeight:1.5}}>{t}</span>
      </label>)}
      <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".05em",margin:"12px 0 8px"}}>Proyectos</div>
      {sub.projects.map((p,pi)=><div key={pi} style={{border:`1px solid ${(projDone||{})[pi]?"#86EFAC":"#E5E7EB"}`,borderRadius:8,padding:"10px 12px",background:(projDone||{})[pi]?"#F0FDF4":"white",marginBottom:6,display:"flex",gap:10,alignItems:"flex-start"}}>
        <div onClick={()=>onProj(pi)} style={{width:20,height:20,borderRadius:5,border:`2px solid ${(projDone||{})[pi]?sub.color:"#D1D5DB"}`,background:(projDone||{})[pi]?sub.color:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",marginTop:1}}>
          {(projDone||{})[pi]&&<span style={{color:"white",fontSize:10}}>✓</span>}
        </div>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:(projDone||{})[pi]?"#166534":"#111827",marginBottom:2}}>{p.t} <Pill label={p.tag} color={sub.color} bg={sub.bg}/></div>
          <div style={{fontSize:11,color:"#6B7280"}}>{p.d}</div>
        </div>
      </div>)}
    </div>}
  </div>;
}

// ─── MODULE DETAIL ────────────────────────────────────────────────────────────
function ModDetail({mod,progress,onProgress,provider,apiKey}) {
  const [tab,setTab]=useState("contenido");
  const top=progress.topics||[], prj=progress.projects||{};
  const toggleTopic=i=>{ const n=[...top]; n[i]=!n[i]; onProgress({...progress,topics:n}); };
  const toggleProj=pi=>{ onProgress({...progress,projects:{...prj,[pi]:!prj[pi]}}); };
  const toggleSubT=(sid,i)=>{ const st=progress.subTopics||{}; const c=st[sid]||[]; const n=[...c]; n[i]=!n[i]; onProgress({...progress,subTopics:{...st,[sid]:n}}); };
  const toggleSubP=(sid,pi)=>{ const sp=progress.subProjs||{}; const c=sp[sid]||{}; onProgress({...progress,subProjs:{...sp,[sid]:{...c,[pi]:!c[pi]}}}); };

  let total=0,done=0;
  if(mod.submodules){ mod.submodules.forEach(s=>{ total+=s.topics.length+s.projects.length; const st=(progress.subTopics||{})[s.id]||[]; const sp=(progress.subProjs||{})[s.id]||{}; done+=st.filter(Boolean).length+Object.values(sp).filter(Boolean).length; }); }
  else { total=mod.topics.length+mod.projects.length; done=top.filter(Boolean).length+Object.values(prj).filter(Boolean).length; }
  const pct=total>0?Math.round(done/total*100):0;

  const Tab=({id,label,icon})=><button onClick={()=>setTab(id)} style={{flex:1,padding:"10px 0",border:"none",background:"transparent",fontSize:13,fontWeight:tab===id?700:400,color:tab===id?mod.color.t:"#9CA3AF",borderBottom:tab===id?`2px solid ${mod.color.t}`:"2px solid transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
    <span style={{fontSize:14}}>{icon}</span>{label}
  </button>;

  return <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0}}>
    <div style={{padding:"14px 14px 0",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:12}}>
        <div style={{width:46,height:46,borderRadius:12,background:mod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{mod.emoji}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
            <span style={{fontSize:10,color:"#9CA3AF",fontWeight:700}}>MÓDULO {mod.id}</span>
            <Pill label={mod.level} color={mod.color.t} bg={mod.color.bg}/>
          </div>
          <h2 style={{fontSize:16,fontWeight:800,color:"#111827",margin:"0 0 2px",lineHeight:1.3}}>{mod.name}</h2>
          <p style={{fontSize:11,color:"#6B7280",margin:0}}>{mod.weeks} · {mod.hours}</p>
        </div>
        <Ring pct={pct} size={44} sw={4} color={mod.color.t}/>
      </div>
    </div>
    <div style={{display:"flex",borderBottom:"1px solid #F3F4F6",flexShrink:0,padding:"0 14px"}}>
      <Tab id="contenido" label="Contenido" icon="📋"/>
      <Tab id="ia" label="Tutor IA" icon="🤖"/>
    </div>
    <div style={{flex:1,overflow:tab==="ia"?"hidden":"auto",display:"flex",flexDirection:"column",minHeight:0}}>
      {tab==="contenido"&&<div style={{padding:"14px",paddingBottom:60,overflowY:"auto"}}>
        {mod.submodules?<>
          <div style={{background:"#FFFBEB",border:"1px solid #FCD34D",borderRadius:10,padding:"10px 12px",marginBottom:14,display:"flex",gap:8}}>
            <span style={{fontSize:14,flexShrink:0}}>💡</span>
            <p style={{fontSize:11,color:"#92400E",margin:0,lineHeight:1.6}}>Este módulo tiene <strong>3 sub-módulos</strong>. Usa el <strong>Tutor IA</strong> para sesiones guiadas de Python, JavaScript y la API.</p>
          </div>
          {mod.submodules.map(sub=><SubCard key={sub.id} sub={sub}
            topicChecked={(progress.subTopics||{})[sub.id]} projDone={(progress.subProjs||{})[sub.id]}
            onTopic={i=>toggleSubT(sub.id,i)} onProj={pi=>toggleSubP(sub.id,pi)}/>)}
        </>:<>
          <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".05em",marginBottom:10}}>Temas</div>
          {mod.topics.map((t,i)=><label key={i} onClick={()=>toggleTopic(i)} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 10px",borderRadius:8,cursor:"pointer",marginBottom:4,background:top[i]?"#F0FDF4":"#FAFAFA",border:`1px solid ${top[i]?"#86EFAC":"#F3F4F6"}`,transition:"all .15s"}}>
            <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${top[i]?mod.color.t:"#D1D5DB"}`,background:top[i]?mod.color.t:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
              {top[i]&&<span style={{color:"white",fontSize:9}}>✓</span>}
            </div>
            <span style={{fontSize:13,color:top[i]?"#166534":"#374151",textDecoration:top[i]?"line-through":"none",lineHeight:1.5}}>{t}</span>
          </label>)}
          <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".05em",margin:"16px 0 10px"}}>Proyectos hands-on</div>
          {mod.projects.map((p,pi)=><div key={pi} style={{border:`1px solid ${prj[pi]?"#86EFAC":"#E5E7EB"}`,borderRadius:10,padding:"12px",background:prj[pi]?"#F0FDF4":"white",marginBottom:8,display:"flex",gap:10,alignItems:"flex-start"}}>
            <div onClick={()=>toggleProj(pi)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${prj[pi]?mod.color.t:"#D1D5DB"}`,background:prj[pi]?mod.color.t:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",marginTop:1}}>
              {prj[pi]&&<span style={{color:"white",fontSize:11}}>✓</span>}
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:3}}>
                <span style={{fontSize:13,fontWeight:700,color:prj[pi]?"#166534":"#111827"}}>{p.t}</span>
                <Pill label={p.tag} color={mod.color.t} bg={mod.color.bg}/>
              </div>
              <p style={{fontSize:12,color:prj[pi]?"#15803D":"#6B7280",margin:0,lineHeight:1.5}}>{p.d}</p>
            </div>
          </div>)}
        </>}
        <div style={{marginTop:16,padding:"12px",background:mod.color.bg,border:`1px solid ${mod.color.b}`,borderRadius:10,display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:18}}>🤖</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:mod.color.t,marginBottom:2}}>¿Listo para practicar?</div>
            <div style={{fontSize:11,color:"#6B7280"}}>Ve al Tutor IA para sesiones guiadas</div>
          </div>
          <button onClick={()=>setTab("ia")} style={{background:mod.color.t,color:"white",border:"none",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>Ir →</button>
        </div>
      </div>}
      {tab==="ia"&&<div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0,overflow:"hidden"}}>
        <Chat mod={mod} provider={provider} apiKey={apiKey}/>
      </div>}
    </div>
  </div>;
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function Settings({provider, onChangeProvider, onBack, onClearAll}) {
  const prov = PROVIDERS[provider];
  const [confirm,setConfirm]=useState(false);
  return <div style={{padding:"20px 16px",maxWidth:440,margin:"0 auto"}}>
    <h2 style={{fontSize:18,fontWeight:800,color:"#111827",marginBottom:6}}>Ajustes</h2>

    {/* Current provider */}
    <div style={{background:prov.bg,border:`1.5px solid ${prov.border}`,borderRadius:12,padding:"12px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:20}}>{prov.emoji}</span>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:700,color:"#111827"}}>Proveedor activo: {prov.name}</div>
        <div style={{fontSize:11,color:"#6B7280",marginTop:1}}>{prov.model} · {prov.limits[0]}</div>
      </div>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <button onClick={onChangeProvider} style={{padding:"14px",borderRadius:12,border:"1px solid #E5E7EB",background:"white",fontSize:13,fontWeight:700,color:"#111827",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
        🔄 <span>Cambiar proveedor o API key</span>
      </button>
      {!confirm
        ?<button onClick={()=>setConfirm(true)} style={{padding:"14px",borderRadius:12,border:"1px solid #FECACA",background:"#FEF2F2",fontSize:13,fontWeight:700,color:"#B91C1C",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
          🗑️ <span>Borrar todo (progreso + clave)</span>
        </button>
        :<div style={{padding:"14px",borderRadius:12,border:"1px solid #FECACA",background:"#FEF2F2"}}>
          <p style={{fontSize:13,color:"#B91C1C",marginBottom:10}}>¿Seguro? Se borrará todo el progreso, historial de chat y tu API key.</p>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setConfirm(false)} style={{flex:1,padding:"9px",borderRadius:8,border:"1px solid #E5E7EB",background:"white",fontSize:12,cursor:"pointer"}}>Cancelar</button>
            <button onClick={onClearAll} style={{flex:1,padding:"9px",borderRadius:8,border:"none",background:"#B91C1C",color:"white",fontSize:12,fontWeight:700,cursor:"pointer"}}>Sí, borrar todo</button>
          </div>
        </div>
      }
    </div>
  </div>;
}

// ─── HOME ────────────────────────────────────────────────────────────────────
function Home({progMap,provider,onSelect,onSettings}) {
  const prov = PROVIDERS[provider];
  const getP=mod=>{ const p=progMap[mod.id]||{}; let total=0,done=0;
    if(mod.submodules){mod.submodules.forEach(s=>{total+=s.topics.length+s.projects.length;const st=(p.subTopics||{})[s.id]||[];const sp=(p.subProjs||{})[s.id]||{};done+=st.filter(Boolean).length+Object.values(sp).filter(Boolean).length;});}
    else{total=mod.topics.length+mod.projects.length;done=(p.topics||[]).filter(Boolean).length+Object.values(p.projects||{}).filter(Boolean).length;}
    return total>0?Math.round(done/total*100):0;
  };
  const gp=Math.round(MODULES.reduce((a,m)=>a+getP(m),0)/MODULES.length);

  return <div style={{paddingBottom:40}}>
    <div style={{padding:"22px 16px 16px",borderBottom:"1px solid #E5E7EB",background:"white"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#9CA3AF",letterSpacing:".08em",textTransform:"uppercase",marginBottom:5}}>Bootcamp · 12 semanas · 2–4h/día</div>
          <h1 style={{fontSize:22,fontWeight:900,color:"#111827",margin:"0 0 5px",lineHeight:1.2}}>De Básico<br/>a Experto en Claude</h1>
          <p style={{fontSize:12,color:"#6B7280",margin:0}}>7 módulos · 20+ proyectos · Tutor IA gratis</p>
        </div>
        <Ring pct={gp} size={58} sw={5} color="#111827"/>
      </div>
      {/* Provider badge */}
      <div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:10,padding:"5px 10px",borderRadius:20,background:prov.bg,border:`1px solid ${prov.border}`}}>
        <span style={{fontSize:12}}>{prov.emoji}</span>
        <span style={{fontSize:11,fontWeight:700,color:prov.color}}>{prov.name}</span>
        <span style={{fontSize:10,color:"#6B7280"}}>· {prov.limits[0]} · {prov.limits[1]}</span>
      </div>
      <div style={{height:5,background:"#F3F4F6",borderRadius:5,overflow:"hidden",marginTop:12}}>
        <div style={{height:"100%",width:gp+"%",background:"#111827",borderRadius:5,transition:"width .6s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
        <span style={{fontSize:10,color:"#9CA3AF"}}>Progreso total</span>
        <span style={{fontSize:10,color:"#9CA3AF"}}>{gp}% completado</span>
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:"#F9FAFB",borderBottom:"1px solid #E5E7EB"}}>
      {[{v:"12",l:"semanas"},{v:"~400h",l:"práctica"},{v:"20+",l:"proyectos"}].map((s,i)=>(
        <div key={i} style={{padding:"12px 8px",textAlign:"center",borderRight:i<2?"1px solid #E5E7EB":"none"}}>
          <div style={{fontSize:17,fontWeight:800,color:"#111827"}}>{s.v}</div>
          <div style={{fontSize:10,color:"#9CA3AF"}}>{s.l}</div>
        </div>
      ))}
    </div>

    <div style={{padding:"14px"}}>
      <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Módulos del programa</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {MODULES.map(mod=>{ const pct=getP(mod),active=pct>0;
          return <button key={mod.id} onClick={()=>onSelect(mod.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px",borderRadius:14,border:`1.5px solid ${active?mod.color.b:"#E5E7EB"}`,background:active?mod.color.bg+"BB":"white",cursor:"pointer",textAlign:"left",transition:"all .15s",width:"100%"}}>
            <div style={{width:42,height:42,borderRadius:11,background:mod.color.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{mod.emoji}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2,flexWrap:"wrap"}}>
                <span style={{fontSize:9,color:"#9CA3AF",fontWeight:700}}>{mod.id}</span>
                <Pill label={mod.level} color={mod.color.t} bg={mod.color.bg}/>
                {mod.submodules&&<Pill label="3 sub-mód." color="#6D28D9" bg="#F5F3FF"/>}
              </div>
              <div style={{fontSize:14,fontWeight:700,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{mod.name}</div>
              <div style={{fontSize:11,color:"#6B7280",marginTop:1}}>{mod.weeks} · {mod.hours}</div>
            </div>
            <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
              <Ring pct={pct} size={38} sw={3} color={mod.color.t}/>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:pct===100?"#22C55E":pct>0?"#F59E0B":"#E5E7EB"}}/>
                <span style={{fontSize:10,color:"#9CA3AF"}}>{pct===100?"Completo":pct>0?"En curso":"Pendiente"}</span>
              </div>
            </div>
          </button>;
        })}
      </div>
      <button onClick={onSettings} style={{marginTop:14,width:"100%",padding:"11px",borderRadius:10,border:"1px solid #E5E7EB",background:"#F9FAFB",fontSize:12,color:"#6B7280",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        ⚙️ Ajustes (cambiar proveedor, borrar progreso)
      </button>
    </div>
  </div>;
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [cfg, setCfg]     = useLS("cb_cfg_v1", null);   // {provider, apiKey}
  const [progMap, setProgMap] = useLS("cb_prog_v3", {});
  const [view, setView]   = useState("home");
  const [setupMode, setSetupMode] = useState(false);

  const needSetup = !cfg || !cfg.apiKey;

  if (needSetup || setupMode) {
    return <Setup onSave={(provider, apiKey) => { setCfg({provider, apiKey}); setSetupMode(false); }}/>;
  }

  const activeMod = view.startsWith("m:") ? MODULES.find(m=>m.id===view.slice(2)) : null;

  const clearAll = () => {
    Object.keys(localStorage).filter(k=>k.startsWith("cb_")||k.startsWith("chat3_")).forEach(k=>localStorage.removeItem(k));
    setCfg(null); setProgMap({}); setSetupMode(true);
  };

  return <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#F0EFE9",maxWidth:520,margin:"0 auto",boxShadow:"0 0 40px rgba(0,0,0,.08)"}}>
    {/* nav */}
    <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(255,255,255,.97)",backdropFilter:"blur(10px)",borderBottom:"1px solid #F3F4F6",padding:"0 14px",height:50,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      {view!=="home"&&<button onClick={()=>setView("home")} style={{background:"none",border:"none",cursor:"pointer",color:"#374151",fontSize:20,padding:"0 6px 0 0",display:"flex",alignItems:"center",flexShrink:0}}>←</button>}
      <div style={{display:"flex",alignItems:"center",gap:7,flex:1,minWidth:0}}>
        <div style={{width:26,height:26,borderRadius:7,background:"#111827",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"white",flexShrink:0}}>C</div>
        <span style={{fontSize:14,fontWeight:700,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {activeMod?`${activeMod.emoji} Módulo ${activeMod.id}`:view==="settings"?"Ajustes":"Claude Bootcamp"}
        </span>
      </div>
      {/* provider chip in nav */}
      {view==="home"&&<div style={{display:"flex",alignItems:"center",gap:4,background:PROVIDERS[cfg.provider].bg,border:`1px solid ${PROVIDERS[cfg.provider].border}`,borderRadius:20,padding:"3px 8px",flexShrink:0}}>
        <span style={{fontSize:11}}>{PROVIDERS[cfg.provider].emoji}</span>
        <span style={{fontSize:10,fontWeight:700,color:PROVIDERS[cfg.provider].color}}>{PROVIDERS[cfg.provider].name}</span>
      </div>}
    </div>

    {/* content */}
    <div style={{flex:1,overflow:activeMod?"hidden":"auto",display:"flex",flexDirection:"column",minHeight:0}}>
      {activeMod
        ?<ModDetail mod={activeMod} progress={progMap[activeMod.id]||{}}
            onProgress={p=>setProgMap(prev=>({...prev,[activeMod.id]:p}))}
            provider={cfg.provider} apiKey={cfg.apiKey}/>
        :view==="settings"
          ?<Settings provider={cfg.provider} onChangeProvider={()=>setSetupMode(true)} onBack={()=>setView("home")} onClearAll={clearAll}/>
          :<div style={{overflowY:"auto",flex:1}}><Home progMap={progMap} provider={cfg.provider} onSelect={id=>setView("m:"+id)} onSettings={()=>setView("settings")}/></div>
      }
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
